services:
  - type: web
    name: scramjet-app
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.20.1
      - key: NODE_ENV
        value: production
